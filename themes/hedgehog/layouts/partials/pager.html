<ul class="pager">
    {{ if .Next }}
        <li class="previous"><a href="{{ .Next.Permalink }}">&larr; {{ .Next.Title }}</a></li>
    {{ else }}
        <li class="previous disabled"><a href="#">&larr; Previous</a></li>
    {{ end }}
     
    {{ if .Prev }}
        <li class="next"><a href="{{ .Prev.Permalink }}">{{ .Prev.Title }} &rarr;</a></li>
    {{ else }}
        <li class="next disabled"><a href="#">Next &rarr;</a></li>
    {{ end }}
</ul>
